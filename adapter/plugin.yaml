name: voice-platform
label: Voice
kind: platform
version: 1.0.0
description: >
  Voice platform adapter for Hermes Agent.
  Accepts WebSocket connections from the Hermes Voice Android app,
  receives STT text, routes through the full agent pipeline, and
  pushes streaming replies back for TTS playback.
  Designed for hands-free voice interaction (driving, walking, etc.)

author: qiu
requires_env:
  - name: VOICE_TOKEN
    description: "Authentication token for voice app connections"
    prompt: "Voice app auth token"
    password: true
optional_env:
  - name: VOICE_WS_PORT
    description: "WebSocket server port (default: 8650)"
    prompt: "Voice WebSocket port"
    password: false
  - name: VOICE_ALLOWED_DEVICES
    description: "Comma-separated device IDs allowed (* = all)"
    prompt: "Allowed device IDs (* for all)"
    password: false
  - name: VOICE_HOME_CHANNEL
    description: "Default device ID for cron/notification delivery"
    prompt: "Home channel device ID"
    password: false
  - name: VOICE_HOME_CHANNEL_NAME
    description: "Human label for the home channel"
    prompt: "Home channel display name"
    password: false
